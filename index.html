<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Malvin's World — A 3D Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg-0: #f3d4a6;
    --bg-1: #e8a877;
    --text: #2a1a10;
    --text-dim: #5a3a25;
    --text-mute: #8a6a50;
    --line: rgba(60, 35, 20, 0.14);
    --line-strong: rgba(60, 35, 20, 0.32);
    --accent: #c44a1f;
    --accent-2: #e8893d;
    --paper: #fdf2dc;
    --serif: 'Instrument Serif', ui-serif, Georgia, serif;
    --sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg-0);color:var(--text);font-family:var(--sans);overflow:hidden}
  body{margin:0}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}

  #root{position:fixed;inset:0}

  /* The 3D canvas fills the viewport */
  .world-canvas-wrap{position:absolute;inset:0;z-index:1;cursor:grab}
  .world-canvas-wrap.grabbing{cursor:grabbing}
  .world-canvas-wrap canvas{display:block;width:100%;height:100%}

  /* Vignette */
  .vignette{
    position:fixed;inset:0;pointer-events:none;z-index:10;
    background: radial-gradient(150% 100% at 50% 60%, transparent 50%, rgba(80,30,10,0.28) 100%);
  }
  .grain{
    position:fixed;inset:0;pointer-events:none;z-index:11;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");
  }

  /* ── NAV ───────────────────────────────────────────── */
  .nav{
    position:fixed;top:0;left:0;right:0;z-index:30;
    display:flex;align-items:flex-start;justify-content:space-between;
    padding:24px 32px;
    pointer-events:none;
  }
  .nav > *{pointer-events:auto}
  .nav .brand{
    font-family:var(--serif);font-weight:400;
    font-size:24px;line-height:1.0;color:var(--text);
    letter-spacing:-0.01em;
  }
  .nav .brand .sub{
    display:block;
    font-family:var(--mono);font-size:10px;color:var(--text-dim);
    letter-spacing:0.18em;text-transform:uppercase;margin-top:4px;font-weight:400;
  }
  .nav .nav-links{
    display:flex;gap:6px;align-items:center;
    background: rgba(253, 242, 220, 0.5);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border:1px solid var(--line);
    border-radius: 999px;
    padding:6px;
  }
  .nav .nav-links button{
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--text-dim);padding:8px 14px;border-radius: 999px;transition:all .2s;
  }
  .nav .nav-links button:hover{color:var(--text);background:rgba(196,74,31,0.08)}
  .nav .nav-links button.active{background:var(--accent);color:#fff}

  .clock{
    font-family:var(--mono);font-size:10.5px;color:var(--text-dim);
    letter-spacing:.14em;text-transform:uppercase;
    text-align:right;line-height:1.5;
  }
  .clock b{color:var(--text);font-weight:500}

  /* ── DRAG HINT ─────────────────────────────────────── */
  .drag-hint{
    position:fixed;left:50%;top:auto;bottom:88px;transform:translateX(-50%);z-index:20;
    pointer-events:none;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--text);
    transition:opacity 1.2s ease;
    text-shadow:0 1px 4px rgba(253, 242, 220, 0.5);
  }
  .drag-hint.hidden{opacity:0}
  .drag-hint svg{width:32px;height:32px;opacity:.7}
  .drag-hint .arrows{display:flex;gap:18px;align-items:center;font-size:14px;color:var(--accent);
    animation:dragPulse 2s ease-in-out infinite;
  }
  @keyframes dragPulse{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-6px)}
    75%{transform:translateX(6px)}
  }

  /* ── TOOLTIP ───────────────────────────────────────── */
  .tooltip{
    position:fixed;z-index:40;pointer-events:none;
    transform:translate(-50%, calc(-100% - 22px));
    background: rgba(253, 242, 220, 0.95);
    backdrop-filter: blur(20px);
    border:1px solid var(--line-strong);
    border-radius:10px;
    padding:12px 16px;
    box-shadow: 0 12px 32px rgba(80,30,10,0.18);
    max-width:240px;
    opacity:0;transition:opacity .15s;
  }
  .tooltip.visible{opacity:1}
  .tooltip .ttl-num{
    font-family:var(--mono);font-size:9.5px;color:var(--accent);letter-spacing:.16em;text-transform:uppercase;
    margin-bottom:6px;
  }
  .tooltip .ttl-title{
    font-family:var(--serif);font-size:22px;line-height:1.05;letter-spacing:-0.01em;color:var(--text);
    margin-bottom:4px;
  }
  .tooltip .ttl-title em{font-style:italic;color:var(--accent)}
  .tooltip .ttl-desc{
    font-size:11.5px;line-height:1.5;color:var(--text-dim);
  }
  .tooltip .ttl-hint{
    margin-top:8px;font-family:var(--mono);font-size:9.5px;color:var(--text-mute);
    letter-spacing:.1em;text-transform:uppercase;
    display:flex;align-items:center;gap:6px;
  }
  .tooltip .ttl-hint .key{
    border:1px solid var(--line-strong);border-radius:4px;padding:1px 5px;color:var(--text-dim);
  }
  .tooltip::after{
    content:'';position:absolute;left:50%;bottom:-7px;transform:translateX(-50%) rotate(45deg);
    width:12px;height:12px;background:inherit;
    border-right:1px solid var(--line-strong);
    border-bottom:1px solid var(--line-strong);
  }
  .ttl-photo{
    width:56px;height:56px;border-radius:50%;overflow:hidden;
    border:1px solid var(--line-strong);margin-bottom:10px;
    background:var(--paper);
  }
  .ttl-photo img{display:block;width:100%;height:100%;object-fit:cover}

  /* ── ABOUT PANEL LAYOUT ───────────────────────────── */
  .ab-grid{
    display:grid;
    grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.1fr);
    gap:36px;align-items:start;
  }
  .ab-left{display:flex;flex-direction:column;gap:18px}
  .ab-photo{
    width:140px;height:140px;border-radius:50%;overflow:hidden;
    border:1px solid var(--line-strong);
    box-shadow:0 8px 24px rgba(80,30,10,0.18);
  }
  .ab-photo img{display:block;width:100%;height:100%;object-fit:cover}
  .ab-bio{font-size:14px;line-height:1.65;color:var(--text-dim)}
  .ab-bio b{color:var(--text);font-weight:500}
  .ab-h{
    font-family:var(--serif);font-size:22px;font-weight:400;color:var(--text);
    letter-spacing:-0.01em;margin-bottom:12px;
  }
  .ab-clist{display:flex;flex-direction:column;gap:8px}
  .ab-cbtn{
    display:flex;align-items:center;gap:10px;
    border:1px solid var(--line-strong);border-radius:10px;
    padding:11px 14px;
    font-family:var(--mono);font-size:11.5px;color:var(--text);
    letter-spacing:.06em;transition:all .2s;
  }
  .ab-cbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .ab-cbtn svg{flex-shrink:0}

  .ab-right{display:flex;flex-direction:column;gap:32px}
  .ab-section{}
  .tline{
    display:flex;flex-direction:column;gap:18px;
    border-left:1px solid var(--line);padding-left:18px;
    position:relative;
  }
  .titem{
    position:relative;
    display:grid;grid-template-columns:1fr auto;gap:4px 12px;
    align-items:start;
  }
  .titem::before{
    content:'';position:absolute;left:-22px;top:5px;
    width:9px;height:9px;border-radius:50%;
    background:var(--paper);border:1.5px solid var(--accent);
  }
  .titem-role{
    font-family:var(--serif);font-size:19px;line-height:1.15;color:var(--text);
    letter-spacing:-0.005em;
  }
  .titem-org{
    font-family:var(--mono);font-size:10.5px;color:var(--text-dim);
    margin-top:4px;letter-spacing:.04em;
  }
  .titem-date{
    font-family:var(--mono);font-size:10.5px;color:var(--text-mute);
    letter-spacing:.1em;text-transform:uppercase;
    align-self:start;padding-top:3px;white-space:nowrap;
  }
  .titem-desc{
    grid-column:1 / -1;font-size:12.5px;line-height:1.55;
    color:var(--text-dim);margin-top:6px;
  }

  /* Projects extras */
  .pitem .pcourse{
    font-family:var(--mono);font-size:10.5px;color:var(--text-mute);
    letter-spacing:.06em;margin:2px 0 10px;
  }

  @media (max-width: 720px){
    .ab-grid{grid-template-columns:1fr;gap:24px}
    .ab-photo{width:120px;height:120px}
  }

  /* ── SIDE PANEL ────────────────────────────────────── */
  .panel-backdrop{
    position:fixed;inset:0;z-index:48;
    background:rgba(40,20,10,0.25);backdrop-filter: blur(4px);
    opacity:0;pointer-events:none;transition:opacity .35s;
  }
  .panel-backdrop.open{opacity:1;pointer-events:auto}
  .panel{
    position:fixed;top:0;right:0;bottom:0;z-index:50;
    width:min(560px, 92vw);
    background: linear-gradient(180deg, var(--paper) 0%, #f6e5c4 100%);
    border-left:1px solid var(--line-strong);
    box-shadow: -20px 0 60px rgba(80,30,10,0.25);
    transform:translateX(100%);
    transition:transform .5s cubic-bezier(.22,1,.36,1);
    overflow-y:auto;
    padding:32px 36px 60px;
  }
  .panel.open{transform:translateX(0)}
  .panel .panel-head{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--line);
  }
  .panel .panel-head .label{
    font-family:var(--mono);font-size:10.5px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;
  }
  .panel .panel-head .close{
    width:36px;height:36px;border-radius:50%;border:1px solid var(--line-strong);
    display:grid;place-items:center;color:var(--text-dim);transition:all .2s;
  }
  .panel .panel-head .close:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

  .panel h2{
    font-family:var(--serif);font-weight:400;font-size:64px;line-height:0.95;letter-spacing:-0.02em;
    margin-bottom:24px;
  }
  .panel h2 em{font-style:italic;color:var(--accent)}
  .panel .lead{
    font-family:var(--serif);font-size:22px;line-height:1.35;color:var(--text);margin-bottom:32px;
    font-style:italic;
  }
  .panel p{font-size:14.5px;line-height:1.7;color:var(--text-dim);margin-bottom:14px}
  .panel p b{color:var(--text);font-weight:500}

  /* projects list */
  .plist{display:flex;flex-direction:column;gap:14px}
  .pitem{
    border:1px solid var(--line);border-radius:12px;padding:18px 20px;
    background:rgba(255,255,255,0.4);
    transition:all .2s;cursor:default;
  }
  .pitem:hover{background:rgba(255,255,255,0.7);border-color:var(--line-strong);transform:translateY(-2px)}
  .pitem .ptop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .pitem .pn{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.12em}
  .pitem .pyr{font-family:var(--mono);font-size:10px;color:var(--text-mute);letter-spacing:.08em}
  .pitem h4{
    font-family:var(--serif);font-weight:400;font-size:24px;line-height:1.1;letter-spacing:-0.01em;
    margin-bottom:6px;
  }
  .pitem h4 em{font-style:italic;color:var(--accent)}
  .pitem .pdesc{font-size:12.5px;line-height:1.55;color:var(--text-dim);margin-bottom:10px}
  .pitem .ptags{display:flex;flex-wrap:wrap;gap:6px}
  .pitem .ptags span{
    font-family:var(--mono);font-size:9.5px;color:var(--text-dim);
    border:1px solid var(--line);border-radius:999px;padding:3px 8px;
  }

  /* skills */
  .skg{display:flex;flex-direction:column;gap:20px}
  .skg .skitem{border-top:1px solid var(--line);padding-top:14px}
  .skg .sktitle{
    display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;
  }
  .skg .sktitle h4{font-family:var(--serif);font-size:24px;font-weight:400}
  .skg .sktitle .skn{font-family:var(--mono);font-size:10.5px;color:var(--accent);letter-spacing:.12em}
  .skg .sklist{display:flex;flex-wrap:wrap;gap:6px}
  .skg .sklist span{
    font-family:var(--mono);font-size:11px;color:var(--text);
    background:rgba(196,74,31,0.08);
    border:1px solid rgba(196,74,31,0.18);border-radius:6px;padding:5px 9px;
  }

  /* contact */
  .clist{display:flex;flex-direction:column;gap:0}
  .crow{
    display:flex;justify-content:space-between;align-items:center;
    padding:18px 0;border-bottom:1px solid var(--line);
    transition:padding-left .2s;
  }
  .crow:hover{padding-left:8px}
  .crow .ck{font-family:var(--mono);font-size:10.5px;color:var(--text-mute);letter-spacing:.12em;text-transform:uppercase}
  .crow .cv{font-family:var(--serif);font-size:22px;color:var(--text)}
  .crow .cv .arr{color:var(--accent);margin-left:8px;display:inline-block;transition:transform .2s}
  .crow:hover .cv .arr{transform:translateX(6px)}

  /* ── MARKERS ───────────────────────────────────────── */
  .markers{
    position:fixed;left:50%;bottom:32px;transform:translateX(-50%);z-index:25;
    display:flex;gap:8px;align-items:center;
    background:rgba(253,242,220,0.55);
    backdrop-filter: blur(20px);
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 14px;
  }
  .markers .mk{
    display:flex;align-items:center;gap:6px;
    font-family:var(--mono);font-size:10px;color:var(--text-dim);
    letter-spacing:.1em;text-transform:uppercase;
    padding:6px 10px;border-radius:999px;transition:all .2s;
  }
  .markers .mk .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);transition:transform .2s}
  .markers .mk:hover{color:var(--text);background:rgba(196,74,31,0.08)}
  .markers .mk.active{background:var(--accent);color:#fff}
  .markers .mk.active .dot{background:#fff}
  .markers .mk.active .dot{transform:scale(1.4)}
  .markers .sep{width:1px;height:14px;background:var(--line)}
  .markers .label{
    font-family:var(--mono);font-size:9.5px;color:var(--text-mute);letter-spacing:.18em;text-transform:uppercase;
    padding:0 8px;
  }

  /* ── MUSIC TOGGLE ──────────────────────────────────── */
  .music-toggle{
    position:fixed;left:24px;bottom:24px;z-index:30;
    width:46px;height:46px;border-radius:50%;
    background:rgba(253,242,220,0.7);
    border:1px solid var(--line-strong);
    backdrop-filter: blur(20px);
    display:grid;place-items:center;
    color:var(--text-dim);transition: all .2s;
  }
  .music-toggle:hover{border-color:var(--accent);color:var(--accent)}
  .music-toggle.on{color:var(--accent);border-color:var(--accent)}
  .music-toggle .bars{display:flex;gap:2px;align-items:center;height:14px}
  .music-toggle .bars span{width:2px;height:8px;background:currentColor;border-radius:1px}
  .music-toggle.on .bars span{animation:eq 1s ease-in-out infinite}
  .music-toggle.on .bars span:nth-child(2){animation-delay:.15s}
  .music-toggle.on .bars span:nth-child(3){animation-delay:.3s}
  .music-toggle.on .bars span:nth-child(4){animation-delay:.45s}
  @keyframes eq{0%,100%{height:4px}50%{height:14px}}

  /* ── HOTSPOT LABEL (rendered as react above object) ── */
  .hot-label{
    position:absolute;pointer-events:none;z-index:15;
    transform:translate(-50%, -50%);
    font-family:var(--mono);font-size:10px;color:var(--text);
    letter-spacing:.14em;text-transform:uppercase;
    background: rgba(253, 242, 220, 0.7);
    backdrop-filter: blur(10px);
    border:1px solid var(--line);
    border-radius:999px;
    padding:4px 10px;
    white-space:nowrap;
    transition:opacity .3s, transform .3s;
  }

  /* loading */
  .loader{
    position:fixed;inset:0;z-index:200;background:var(--bg-0);
    display:grid;place-items:center;
    transition:opacity .8s, visibility .8s;
  }
  .loader.gone{opacity:0;visibility:hidden}
  .loader .ring{
    width:60px;height:60px;border-radius:50%;
    border:2px solid rgba(60,35,20,0.18);border-top-color:var(--accent);
    animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader .ld-text{
    position:absolute;bottom:30%;font-family:var(--mono);font-size:11px;
    color:var(--text-dim);letter-spacing:.32em;text-transform:uppercase;
  }

  @media (max-width: 720px){
    .nav{padding:14px 16px;flex-wrap:wrap;gap:12px}
    .nav .nav-links{order:3;width:100%;justify-content:center}
    .nav .nav-links button{padding:6px 10px;font-size:10px}
    .panel{padding:24px 22px 48px}
    .panel h2{font-size:42px}
    .markers .mk .lbl{display:none}
  }
</style>
</head>
<body>
  <div id="root"></div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <!-- libs -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="world.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
